[versions]
# Verified 2026-07-12 against Maven Central / plugins.gradle.org / vendor docs.
# Flamingock is moving quickly (see catalog-service/notification-service build files) —
# re-check its version before relying on it beyond the scaffold stage.
kotlin = "2.4.0"
spring-boot = "4.0.6"
spring-dependency-management = "1.1.7"
protobuf-plugin = "0.10.0"
protobuf-java = "4.35.1"
grpc-java = "1.82.1"
grpc-kotlin = "1.4.3"
flamingock = "1.4.4"
# Not independently version-pinned before Phase 5 — io.grpc:grpc-kotlin-stub
# depends on kotlinx-coroutines-core internally but (per its own published
# module metadata) does not expose it as an `api` dependency, so it's
# resolved only on the runtime classpath transitively, not the compile
# classpath source code needs to reference kotlinx.coroutines.* directly
# (e.g. `runBlocking` at a suspend/blocking-code boundary). 1.10.2 matches
# what `./gradlew :identity-service:dependencies` already resolves this to
# transitively, so declaring it explicitly here doesn't change the resolved
# version, only makes it visible where source code needs to import it.
kotlinx-coroutines = "1.10.2"
# Verified 2026-07-13 directly against the Maven Central search API
# (search.maven.org/solrsearch/select?g=io.jsonwebtoken) — 0.12.6 is the
# newest published release of jjwt-api/jjwt-impl/jjwt-jackson.
jjwt = "0.12.6"
# Verified 2026-07-13 the same way (g=org.testcontainers, a=postgresql) —
# Spring Boot 4.0.6's dependency-management BOM does not pin a testcontainers
# version on its own, so it's declared explicitly here via the BOM platform.
testcontainers = "1.21.3"

[plugins]
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
kotlin-jpa = { id = "org.jetbrains.kotlin.plugin.jpa", version.ref = "kotlin" }
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
protobuf = { id = "com.google.protobuf", version.ref = "protobuf-plugin" }

[libraries]
grpc-kotlin-stub = { module = "io.grpc:grpc-kotlin-stub", version.ref = "grpc-kotlin" }
grpc-protobuf = { module = "io.grpc:grpc-protobuf", version.ref = "grpc-java" }
grpc-stub = { module = "io.grpc:grpc-stub", version.ref = "grpc-java" }
grpc-netty = { module = "io.grpc:grpc-netty", version.ref = "grpc-java" }
grpc-services = { module = "io.grpc:grpc-services", version.ref = "grpc-java" }
protobuf-kotlin = { module = "com.google.protobuf:protobuf-kotlin", version.ref = "protobuf-java" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }
flamingock-core = { module = "io.flamingock:flamingock-core", version.ref = "flamingock" }
jjwt-api = { module = "io.jsonwebtoken:jjwt-api", version.ref = "jjwt" }
jjwt-impl = { module = "io.jsonwebtoken:jjwt-impl", version.ref = "jjwt" }
jjwt-jackson = { module = "io.jsonwebtoken:jjwt-jackson", version.ref = "jjwt" }
testcontainers-bom = { module = "org.testcontainers:testcontainers-bom", version.ref = "testcontainers" }
